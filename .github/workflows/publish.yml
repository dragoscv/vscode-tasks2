name: publish
on:
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'extension.js'
      - 'CHANGELOG.md'
      - 'README.md'
      - 'logo.png'
      - 'jshintrc.*.json'
      - '.github/workflows/publish.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      HAS_OVSX: ${{ secrets.OVSX_KEY != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Read package metadata
        id: pkg
        run: |
          name=$(node -p "require('./package.json').name")
          publisher=$(node -p "require('./package.json').publisher")
          version=$(node -p "require('./package.json').version")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "publisher=$publisher" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "id=$publisher.$name" >> "$GITHUB_OUTPUT"

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Check VS Marketplace for existing version
        id: vsce_check
        env:
          EXT_ID: ${{ steps.pkg.outputs.id }}
          EXT_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          if vsce show "$EXT_ID" --json > /tmp/marketplace.json 2>/dev/null; then
            published=$(node -e "const v=require('/tmp/marketplace.json').versions||[];console.log(v.some(x=>x.version===process.env.EXT_VERSION)?'yes':'no')")
          else
            published=no
          fi
          echo "published=$published" >> "$GITHUB_OUTPUT"
          echo "::notice::Marketplace has $EXT_ID@$EXT_VERSION: $published"

      - name: Publish to VS Marketplace
        if: steps.vsce_check.outputs.published == 'no'
        env:
          VSCE_PAT: ${{ secrets.VSCE_KEY }}
        run: |
          set +e
          out=$(vsce publish 2>&1)
          code=$?
          echo "$out"
          if [ $code -ne 0 ]; then
            if echo "$out" | grep -qiE "already exists"; then
              echo "::notice::Marketplace already has this version (cache lag) — treating as success."
              exit 0
            fi
            exit $code
          fi

      - name: Skip VS Marketplace (already published)
        if: steps.vsce_check.outputs.published == 'yes'
        run: echo "::notice::${{ steps.pkg.outputs.id }}@${{ steps.pkg.outputs.version }} already on Marketplace — skipping."

      - name: Install ovsx
        if: env.HAS_OVSX == 'true'
        run: npm install -g ovsx

      - name: Ensure Open VSX namespace exists
        if: env.HAS_OVSX == 'true'
        env:
          OVSX_PAT: ${{ secrets.OVSX_KEY }}
        run: ovsx create-namespace ${{ steps.pkg.outputs.publisher }} || true

      - name: Check Open VSX for existing version
        id: ovsx_check
        if: env.HAS_OVSX == 'true'
        env:
          EXT_VERSION: ${{ steps.pkg.outputs.version }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://open-vsx.org/api/${{ steps.pkg.outputs.publisher }}/${{ steps.pkg.outputs.name }}/$EXT_VERSION")
          if [ "$status" = "200" ]; then
            echo "published=yes" >> "$GITHUB_OUTPUT"
          else
            echo "published=no" >> "$GITHUB_OUTPUT"
          fi
          echo "::notice::Open VSX HTTP $status for $EXT_VERSION"

      - name: Publish to Open VSX
        if: env.HAS_OVSX == 'true' && steps.ovsx_check.outputs.published == 'no'
        env:
          OVSX_PAT: ${{ secrets.OVSX_KEY }}
        run: ovsx publish
        continue-on-error: true
